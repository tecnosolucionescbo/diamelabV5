<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprimir Orden de Entrega</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .orden-wrapper {
            background: #fff;
            width: 100%;
            max-width: 880px;
            padding: 30px 35px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        @media print {
            body { background: #fff; padding:0; margin:0; display:block; }
            .orden-wrapper { box-shadow:none; border:none; padding:15px 25px; max-width:100%; border-radius:0; }
            .no-print { display:none !important; }
            .tabla-orden thead { background: #1a237e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .tabla-orden th { color: #fff !important; }
            .info-row { background: #f9fafb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .notas { background: #f9fafb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .tasa-info span { background: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="orden-wrapper" id="orden-wrapper"></div>
    <script src="js/supabase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/imprimir-orden.js"></script>
</body>
</html>
